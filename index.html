<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Digital Rain</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* Hide scrollbars to make it truly full screen */
        }
        canvas {
            display: block;
            /* Removed pixelated rendering to allow HD super-sampling */
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <!-- Load the external dictionary file so the algorithm can access it -->
    <script src="words.js"></script>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        // Super-sample the canvas for true HD High-Quality text when zooming
        const HD_SCALER = 4; // Renders the text internally at 400% resolution

        // Make the canvas full screen but with a massive internal resolution
        canvas.width = window.innerWidth * HD_SCALER;
        canvas.height = window.innerHeight * HD_SCALER;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(HD_SCALER, HD_SCALER);

        // Pull the characters from the external words.js file
        const chars = matrixConfig.characters;
        const charArray = chars.split('');
        const specialWords = matrixConfig.specialWords;

        const fontSize = 16;

        // Grid arrays to mathematically track exact characters and their brightness
        // This is the key to achieving 100% absolute pure black fading
        let columns = Math.ceil(canvas.width / fontSize);
        let rows = Math.ceil(canvas.height / fontSize) + 100; // Extra buffer for voids above screen

        const drops = [];
        const activeWords = [];
        const gridChars = [];
        const gridBright = [];
        const speeds = [];
        const lastHeadY = [];
        const anomalies = [];
        const canSidestep = [];
        const sidestepOffset = [];
        const dropDeathY = [];

        function setDropDeathY(i) {
            const screenRows = window.innerHeight / fontSize;
            // 20% chance to die early, somewhere in the bottom 50% of the screen
            if (Math.random() < 0.20) {
                dropDeathY[i] = screenRows * 0.5 + Math.random() * (screenRows * 0.4);
            } else {
                dropDeathY[i] = screenRows + 20; // Normal offscreen death
            }
        }

        function initData() {
            // Use window.innerWidth/Height so the grid relies on physical screen size
            columns = Math.ceil(window.innerWidth / fontSize);
            rows = Math.ceil(window.innerHeight / fontSize) + 100;

            for (let i = 0; i < columns; i++) {
                if (drops[i] === undefined) {
                    drops[i] = -Math.floor(Math.random() * 100);
                    activeWords[i] = null;
                    gridChars[i] = [];
                    gridBright[i] = [];
                    // Slower, more uniform speeds. Range is now 0.6x to 1.2x (was 0.5x to 2.0x)
                    speeds[i] = 0.6 + Math.random() * 0.6;
                    lastHeadY[i] = -999;
                    anomalies[i] = null;
                    canSidestep[i] = Math.random() < 0.20; // 20% of trails can jump horizontally
                    sidestepOffset[i] = 0;
                    setDropDeathY(i);
                }
                // Fill any new empty cells with random characters and 0 brightness (black)
                for (let j = gridChars[i].length || 0; j < rows; j++) {
                    gridChars[i][j] = charArray[Math.floor(Math.random() * charArray.length)];
                    gridBright[i][j] = 0;
                }
            }
        }
        initData();

        // --- INTERACTIVITY STATE ---
        let currentZoom = 1.0;
        let glowingClusters = [];

        // Handle mouse wheel for global zoom
        window.addEventListener('wheel', (e) => {
            canvas.style.transformOrigin = `${e.clientX}px ${e.clientY}px`;
            if (e.deltaY < 0) {
                currentZoom *= 1.15;
            } else {
                currentZoom /= 1.15;
            }
            currentZoom = Math.max(1.0, Math.min(40.0, currentZoom));

            // With HD super-sampling, we don't need forced CSS pixelation.
            // The canvas will naturally render sharp HD text natively.

            canvas.style.transform = `scale(${currentZoom})`;
        });

        // Handle clicks for sparks
        window.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const worldX = (e.clientX - rect.left) / currentZoom;
            const worldY = (e.clientY - rect.top) / currentZoom;

            const numSparks = 35;
            for (let i = 0; i < numSparks; i++) {
                const radius = Math.pow(Math.random(), 2) * 180;
                const angle = Math.random() * Math.PI * 2;
                const cx = worldX + Math.cos(angle) * radius;
                const cy = worldY + Math.sin(angle) * radius;

                glowingClusters.push({
                    x: Math.floor(cx / fontSize) * fontSize,
                    y: Math.floor(cy / fontSize) * fontSize,
                    char: charArray[Math.floor(Math.random() * charArray.length)],
                    life: 1.0,
                    delay: radius / 12,
                    decay: 0.02 + Math.random() * 0.04
                });
            }
        });

        function draw() {
            // 1. GUARANTEED PURE BLACK BACKGROUND EVERY FRAME
            // This permanently solves the dirty grey accumulation bug
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            ctx.font = fontSize + 'px monospace';
            ctx.textBaseline = 'top';

            // 2. MATHEMATICAL TRAIL RENDERER
            const whiteHeadsToDraw = []; // Store heads to draw them ON TOP of all green trails

            for (let i = 0; i < columns; i++) {

                // --- ABNORMALITIES LOGIC (Stuttering & Sidestepping) ---
                if (!anomalies[i] && drops[i] > 0) {
                    if (canSidestep[i] && Math.random() < 0.01) {
                        // Trigger a horizontal jump (exactly 1 column left or right)
                        const jumpOffset = Math.random() < 0.5 ? -1 : 1;
                        // Jump lasts strictly for a couple of letters (2 to 4 rows)
                        anomalies[i] = { type: 'sidestep', offset: jumpOffset, remainingLetters: Math.floor(Math.random() * 3) + 2 };
                    } else if (Math.random() < 0.002) {
                        // Very rarely trigger a stutter anomaly
                        anomalies[i] = { type: 'stutter', timer: Math.floor(Math.random() * 15) + 5 };
                    }
                }

                sidestepOffset[i] = 0;
                if (anomalies[i]) {
                    if (anomalies[i].type === 'stutter') {
                        anomalies[i].timer--;
                        if (anomalies[i].timer <= 0) anomalies[i] = null;
                    } else if (anomalies[i].type === 'sidestep') {
                        sidestepOffset[i] = anomalies[i].offset;
                    }
                }

                // If stuttering, we don't move the drop this frame
                if (!anomalies[i] || anomalies[i].type !== 'stutter') {
                    drops[i] += speeds[i];
                }

                let headY = Math.floor(drops[i]);
                // Determine which column the head is currently in (handles jumping)
                let targetCol = Math.max(0, Math.min(columns - 1, i + sidestepOffset[i]));

                // Setup the new bright white head ONLY when we actually cross into a new row
                if (headY !== lastHeadY[i]) {
                    // If we are currently sidestepping, count down exactly how many letters have dropped
                    if (anomalies[i] && anomalies[i].type === 'sidestep') {
                        anomalies[i].remainingLetters--;
                        if (anomalies[i].remainingLetters <= 0) {
                            anomalies[i] = null; // Snap back to original trajectory
                            targetCol = i; // Instantly restore column targeting for this frame
                        }
                    }

                    if (headY >= 0 && headY < rows) {
                        gridBright[targetCol][headY] = 1.0; // Max brightness in target column

                        if (activeWords[i] !== null) {
                            let word = activeWords[i].word;
                            let idx = activeWords[i].charIndex;
                            gridChars[targetCol][headY] = word[idx];
                            activeWords[i].charIndex++;
                            if (activeWords[i].charIndex >= word.length) activeWords[i] = null;
                        } else {
                            gridChars[targetCol][headY] = charArray[Math.floor(Math.random() * charArray.length)];
                        }
                    }
                    lastHeadY[i] = headY;
                }

                // Process every cell in this specific column to draw its green trails
                for (let j = 0; j < rows; j++) {
                    if (gridBright[i][j] > 0) {
                        gridBright[i][j] -= 0.02;

                        if (gridBright[i][j] <= 0) {
                            gridBright[i][j] = 0;
                            continue;
                        }

                        // Draw the fading green trail character
                        ctx.fillStyle = `rgba(0, 255, 0, ${gridBright[i][j]})`;
                        ctx.fillText(gridChars[i][j], i * fontSize, j * fontSize);
                    }
                }

                // Save the white head so it draws perfectly over top of all trails
                if (headY >= 0 && headY < rows) {
                    whiteHeadsToDraw.push({
                        x: targetCol * fontSize,
                        y: headY * fontSize,
                        char: gridChars[targetCol][headY]
                    });
                }

                // Trail Glitch Logic
                if (activeWords[i] === null && headY > 3 && Math.random() < 0.5) {
                    const distanceFromHead = Math.floor(Math.pow(Math.random(), 3) * 40);
                    const glitchRow = headY - distanceFromHead;
                    if (glitchRow >= 0 && glitchRow < rows && gridBright[targetCol][glitchRow] > 0) {
                        gridChars[targetCol][glitchRow] = charArray[Math.floor(Math.random() * charArray.length)];
                    }
                }

                // Clustering, Voids, and Death Logic
                // A streak dies and resets if it passes its designated death point (either mid-screen or off-screen)
                if (headY > dropDeathY[i] && Math.random() > 0.90) {
                    let newStart = -Math.floor(Math.random() * 50);

                    // Tighter speed matching for clusters
                    if (i > 0 && drops[i-1] > 0 && drops[i-1] < rows && Math.random() > 0.4) {
                        newStart = drops[i-1] - Math.floor(Math.random() * 10);
                        speeds[i] = speeds[i-1] * (0.95 + Math.random() * 0.1);
                    } else if (i < columns - 1 && drops[i+1] > 0 && drops[i+1] < rows && Math.random() > 0.4) {
                        newStart = drops[i+1] - Math.floor(Math.random() * 10);
                        speeds[i] = speeds[i+1] * (0.95 + Math.random() * 0.1);
                    } else if (Math.random() > 0.85) {
                        newStart = -Math.floor(Math.random() * 200);
                        speeds[i] = 0.6 + Math.random() * 0.6;
                    } else {
                        speeds[i] = 0.6 + Math.random() * 0.6;
                    }

                    // Clamp speed to prevent clustering from causing them to get too fast over time
                    speeds[i] = Math.max(0.5, Math.min(1.3, speeds[i]));

                    drops[i] = newStart;
                    setDropDeathY(i); // Assign a new random death point for its next life

                    if (Math.random() < 0.02) {
                        activeWords[i] = {
                            word: specialWords[Math.floor(Math.random() * specialWords.length)],
                            charIndex: 0
                        };
                    }
                }
            }

            // Draw all pure white heads globally so they stay on top
            ctx.fillStyle = '#FFFFFF';
            for (let i = 0; i < whiteHeadsToDraw.length; i++) {
                ctx.fillText(whiteHeadsToDraw[i].char, whiteHeadsToDraw[i].x, whiteHeadsToDraw[i].y);
            }

            // 3. INTERACTIVE CLICK SPARKS
            for (let i = glowingClusters.length - 1; i >= 0; i--) {
                let spark = glowingClusters[i];
                if (spark.delay > 0) {
                    spark.delay -= 1;
                    continue;
                }
                spark.life -= spark.decay;
                if (spark.life <= 0) {
                    glowingClusters.splice(i, 1);
                    continue;
                }

                ctx.shadowBlur = 25 * spark.life;
                ctx.shadowColor = `rgba(0, 150, 255, ${spark.life})`;
                ctx.fillStyle = `rgba(220, 240, 255, ${spark.life})`;
                ctx.fillText(spark.char, spark.x, spark.y);
            }
            ctx.shadowBlur = 0;
        }

        let drawInterval;
        const targetFallTimeMs = 4000;

        function startAnimation() {
            if (drawInterval) clearInterval(drawInterval);
            const totalRows = window.innerHeight / fontSize;
            const intervalMs = targetFallTimeMs / totalRows;
            drawInterval = setInterval(draw, intervalMs);
        }

        window.addEventListener('resize', () => {
            // Re-apply HD scaling on resize
            canvas.width = window.innerWidth * HD_SCALER;
            canvas.height = window.innerHeight * HD_SCALER;
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.scale(HD_SCALER, HD_SCALER);

            initData();
            startAnimation();
        });

        startAnimation();
    </script>
</body>
</html>
